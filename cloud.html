<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Execution Path</title>
<style>
body{font-family:Arial;background:#0f172a;color:#e2e8f0;margin:0}
.wrap{max-width:900px;margin:auto;padding:20px}
.card{background:#1e293b;padding:16px;border-radius:16px;margin-bottom:16px}
h2{margin:0 0 10px}
.ck{display:flex;gap:10px;margin:8px 0}
.progress{height:8px;background:#334155;border-radius:10px;margin:8px 0}
.fill{height:100%;background:#38bdf8;border-radius:10px}
</style>
</head>
<body>
<div class="wrap">
<h1>Cloud Execution Path</h1>

<div id="modules"></div>

</div>

<script>
const modules = [
 {id:"c0",title:"C0 — Fundamentals",items:["IAM basics","Regions & services","CLI usage"]},
 {id:"c1",title:"C1 — Compute & Storage",items:["EC2/VM setup","S3/Blob storage","VPC basics"]},
 {id:"c2",title:"C2 — Deployment",items:["Deploy simple app","Domain setup","Basic security"]},
 {id:"c3",title:"C3 — Real Integration",items:["Deploy AI tool","Connect API","Monitoring/logging"]}
];

const KEY="cloud_track";

function get(){return JSON.parse(localStorage.getItem(KEY)||"{}")}
function set(s){localStorage.setItem(KEY,JSON.stringify(s))}

function render(){
 const state=get();
 const root=document.getElementById("modules");
 root.innerHTML="";

 modules.forEach(m=>{
  let done=0;

  const items=m.items.map((it,i)=>{
    const id=m.id+"_"+i;
    if(state[id]) done++;
    return `<label class="ck">
      <input type="checkbox" data-id="${id}" ${state[id]?"checked":""}>
      ${it}
    </label>`;
  }).join("");

  const pct=Math.round((done/m.items.length)*100);

  root.innerHTML+=`
  <div class="card">
    <h2>${m.title} (${pct}%)</h2>
    <div class="progress"><div class="fill" style="width:${pct}%"></div></div>
    ${items}
  </div>`;
 });

}

document.addEventListener("change",e=>{
 if(e.target.dataset.id){
   const s=get();
   s[e.target.dataset.id]=e.target.checked;
   set(s);
   render();
 }
});

render();
</script>

</body>
</html>
