<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Python Path</title>
<style>
body{font-family:Arial;background:#0f172a;color:#e2e8f0;margin:0}
.wrap{max-width:900px;margin:auto;padding:20px}
.card{background:#1e293b;padding:16px;border-radius:16px;margin-bottom:16px}
h2{margin:0 0 10px}
.ck{display:flex;gap:10px;margin:8px 0}
</style>
</head>
<body>
<div class="wrap">
<h1>Python Execution Path</h1>

<div class="card">
<h2>P0 — Setup</h2>
<label class="ck"><input type="checkbox" data-id="p0_1"> Install Python</label>
<label class="ck"><input type="checkbox" data-id="p0_2"> Setup venv</label>
</div>

<div class="card">
<h2>P1 — Core</h2>
<label class="ck"><input type="checkbox" data-id="p1_1"> Variables & loops</label>
<label class="ck"><input type="checkbox" data-id="p1_2"> Functions</label>
</div>

<div class="card">
<h2>P2 — Automation</h2>
<label class="ck"><input type="checkbox" data-id="p2_1"> File scripts</label>
<label class="ck"><input type="checkbox" data-id="p2_2"> CLI tools</label>
</div>

<div class="card">
<h2>P3 — AI Integration</h2>
<label class="ck"><input type="checkbox" data-id="p3_1"> API calls</label>
<label class="ck"><input type="checkbox" data-id="p3_2"> LLM usage</label>
</div>

</div>

<script>
const KEY='python_track_v1';
function get(){return JSON.parse(localStorage.getItem(KEY)||'{}')}
function set(s){localStorage.setItem(KEY,JSON.stringify(s))}
document.querySelectorAll('input').forEach(i=>{
  const s=get();
  i.checked=!!s[i.dataset.id];
  i.onchange=()=>{
    s[i.dataset.id]=i.checked;
    set(s);
  }
});
</script>
</body>
</html>
